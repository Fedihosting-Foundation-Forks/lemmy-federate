name: build and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          push: >-
            ${{
              (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
              && github.ref_name == github.event.repository.default_branch
            }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: "pnpm"
      - run: |
          pnpm install --frozen-lockfile
          pnpm run db:generate
      - run: pnpm run check

  deploy:
    if: 0 && github.ref_name == github.event.repository.default_branch
    runs-on: lemy
    needs: [build_push, test]
    steps:
      - run: |
          docker pull ${{ env.DOCKER_IMAGE }}
          if [ "$(docker ps -aq -f name=lemmy-federate)" ]; then
            docker stop lemmy-federate
            docker rm lemmy-federate
          fi
          docker run \
            -e APP_URL -e BLACKLISTED_INSTANCES -e SECRET_KEY -e MASTER_KEY -e DATABASE_URL -e REDIS_URL \
            --name lemmy-federate --detach -p 52312:3000 --restart on-failure --network lemylol_default \
            $DOCKER_IMAGE
        env:
          APP_URL: ${{ vars.APP_URL }}
          BLACKLISTED_INSTANCES: ${{ vars.BLACKLISTED_INSTANCES }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          MASTER_KEY: ${{ secrets.MASTER_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
